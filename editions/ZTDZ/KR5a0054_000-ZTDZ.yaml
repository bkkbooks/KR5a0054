body:
  text: 太上洞淵辤瘟神呪妙經爾時元始天尊與諸大衆在上陽宫内敷演教法時有洞淵天尊上曰元始天尊𥩈見下界生民盡染瘟疫之疾四肢壯熱手足酸疼頭痛眼華五臟盛熱逈如鍼剌不能喫食如何救療是時元始天尊曰皆是下界生民處居人世不敬三寳呵天罵地全無敬讓心行諂曲爲非造罪致令此疾所傷凡爲人民身强力徤不知回向出入往來並無避諱蓋是五帝使者奉天符文牒行於諸般之疾凡人之所爲係在薄書遂行其毒若人吸着便成此疾如有男子女人家染此患宜令闔家斷絶五辛低聲下氣柔軟身心歡喜慈愍禮謝辤遣置立香位請道迎眞於家建立道塲焚香轉誦妙經依教禮謝開於道位次施設齋筵香燈如法請於天符十二年行病神王五帝使者七十二候聖者二十四炁聖衆行瘟大判官俵藥主事行猪羊牛馬瘟疫使者祛災使者癘毒使者地分神王后土社令各領部衆俱降道塲大道之處解此毒癘宜轉此經一時禳謝若凡人係在簿書仍須勾銷放赦奏聞今有弟子某歸依投懇拜奏誠心莫爲留難改死重生於是聖者見此禮謝收瘟攝毒故不流行是時元始天尊乃爲頌曰太上立科教敬信除災殃瘟疫留毒害聞善化吉祥歸依念三寳家門漸吉昌芳能轉此經鬼禍悉潜藏是時洞淵天尊并諸大衆聞此聖言各各歡喜作禮而退信受奉行太上洞淵辤瘟神呪妙經
