body:
  text: 太上洞淵辭瘟神呪妙經爾時元始天尊與諸大衆在上陽宫內敷演教法時有洞淵天尊上曰元始天尊𥩈見下界生民盡染瘟疫之疾四肢壯熱手足酸疼頭痛眼華五臟盛熱逈如針剌不能喫食如何救療是時元始天尊曰皆是下界生民處居人世不敬三寶呵天罵地全無敬讓心行諂曲為非造罪致令此疾所傷凡為人民身強力健不知回向出入往來並無避諱蓋是五帝使者奉天符文牒行於諸般之疾凡人之所為係在薄書遂行其毒若人吸著便成此疾如有男子女人家染此患宜令闔家斷絶五辛低聲下氣柔軟身心歡喜慈愍禮謝辭遣置立香位請道迎真於家建立道場焚香轉誦妙經依教禮謝開於道位次施設齋筵香燈如法請於天符十二年行病神王五帝使者七十二候聖者二十四氣聖衆行瘟大判官俵藥主事行豬羊牛馬瘟疫使者祛災使者癘毒使者地分神王后土社令各領部衆俱降道場大道之處解此毒癘宜轉此經一時禳謝若凡人係在簿書仍須勾銷放赦奏聞今有弟子某歸依投懇拜奏誠心莫為留難改死重生於是聖者見此禮謝收瘟攝毒故不流行是時元始天尊乃為頌曰太上立科教敬信除災殃瘟疫留毒害聞善化吉祥歸依念三寶家門漸吉昌芳能轉此經鬼禍悉潛藏是時洞淵天尊并諸大衆聞此聖言各各歡喜作禮而退信受奉行太上洞淵辭瘟神呪妙經
